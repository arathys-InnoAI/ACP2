<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Complete - ACP Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            max-width: 400px;
        }
        h1 { font-family: 'Outfit', sans-serif; color: #6366f1; margin-bottom: 1rem; }
        p { color: #64748b; line-height: 1.5; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: #6366f1;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verification Success</h1>
        <p>Your payment information has been verified. You can now close this window and return to the Commerce Agent to finalize your order.</p>
        <p style="font-size: 0.875rem;">Just tell the agent: <strong>"I have verified the payment"</strong></p>
        <button onclick="window.close()" class="btn">Close Window</button>
    </div>
</body>
</html>
