<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Commerce Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --user-msg-bg: #eff6ff;
            --agent-msg-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1.5rem;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 0.25rem;
            color: var(--text-main);
        }

        .agent-message {
            align-self: flex-start;
            background-color: var(--agent-msg-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 0.25rem;
            box-shadow: var(--shadow);
            white-space: pre-wrap;
        }

        .auth-container {
            margin-top: 1rem;
            padding: 1rem;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .auth-link {
            display: inline-block;
            background: #d97706;
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            text-align: center;
            transition: background 0.2s;
        }

        .auth-link:hover { background: #b45309; }

        footer {
            padding: 2rem;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary-color); }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--text-secondary); cursor: not-allowed; }

        .typing-indicator {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 0.5rem;
            display: none;
        }

        #status-bar {
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 0.5rem 2rem;
            background: #f1f5f9;
        }
    </style>
</head>
<body>
    <header>
        <h1>ACP Commerce Agent</h1>
        <div id="session-info" style="font-size: 0.875rem; color: var(--text-secondary);">Session: <span id="session-id"></span></div>
    </header>
    <div id="status-bar">Waiting for user...</div>
    <div id="chat-container">
        <div class="message agent-message">Hello! I'm your AI Commerce Agent. I search the ACP Catalog and help you buy products. What are you looking for today?</div>
    </div>
    <div id="typing" class="typing-indicator" style="padding: 1rem 2rem;">Agent is thinking...</div>
    <footer>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message (e.g. 'I want to buy a blue t-shirt')..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');
        const statusText = document.getElementById('status-bar');
        
        // Simple session ID
        const sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-id').innerText = sessionId;

        async function appendMessage(text, isUser = false, extraHtml = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'agent-message'}`;
            msgDiv.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            if (extraHtml) msgDiv.innerHTML += extraHtml;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';
            statusText.innerText = 'Processing with LLM...';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId })
                });

                const data = await response.json();
                
                // Check if the response contains structured 3DS info (parsed from our tool output)
                let extraHtml = '';
                if (data.response.includes('verification_url')) {
                    try {
                        // Attempt to extract the URL if the agent returned it in a predictable way
                        // or if the tool output was surfaced directly.
                        const urlMatch = data.response.match(/"verification_url":\s*"(https?:\/\/[^"]+)"/);
                        if (urlMatch) {
                            const url = urlMatch[1];
                            extraHtml = `
                                <div class="auth-container">
                                    <p><strong>Authentication Required</strong></p>
                                    <p>Please click below to verify your payment securely via Stripe.</p>
                                    <a href="${url}" target="_blank" class="auth-link">Verify Payment</a>
                                    <p style="font-size: 0.75rem; color: #92400e;">Once you complete the challenge, tell me "I have verified the payment".</p>
                                </div>
                            `;
                        }
                    } catch (e) {
                        console.error('Error parsing 3DS link:', e);
                    }
                }

                appendMessage(data.response, false, extraHtml);
            } catch (error) {
                appendMessage("Error: " + error.message, false);
            } finally {
                sendBtn.disabled = false;
                typingIndicator.style.display = 'none';
                statusText.innerText = 'Ready';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
